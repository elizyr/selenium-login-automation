# ============================================================
# Configurações dos testes de automação
# ============================================================

# URL base da aplicação (site público para demonstração)
base.url=https://the-internet.herokuapp.com/login

# Credenciais válidas (compatíveis com the-internet.herokuapp.com)
valid.username=tomsmith
valid.password=SuperSecretPassword!

# Timeouts (em segundos)
implicit.wait=5
explicit.wait=10

# Browser: chrome | firefox
# Pode ser sobrescrito via -Dbrowser=firefox na linha de comando
browser=chrome

# Headless: true | false
# Pode ser sobrescrito via -Dheadless=false na linha de comando
headless=true
